<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VocabLens Video</title>
  <link rel="stylesheet" href="../styles/shared.css">
  <link rel="stylesheet" href="video-panel.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="vp-header">
      <div class="vp-header-top">
        <div class="vp-header-left">
          <img src="../icons/icon32.png" alt="" class="vp-header-icon">
          <h1 class="vp-header-title">VocabLens</h1>
        </div>
        <div class="vp-header-right">
          <button id="pipBtn" class="vp-pip-btn" title="Picture-in-Picture">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <rect x="1" y="3" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
              <rect x="9" y="8" width="7" height="5" rx="1" fill="currentColor" opacity="0.6"/>
            </svg>
            PiP
          </button>
          <button id="settingsBtn" class="vp-icon-btn" title="設定">
            <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
              <path d="M7.5 2.25h3l.375 1.875.75.375L13.5 3.75l2.25 2.25-.75 1.875.375.75L17.25 9v3l-1.875.375-.375.75.75 1.875-2.25 2.25-1.875-.75-.75.375L10.5 18.75h-3l-.375-1.875-.75-.375L4.5 17.25l-2.25-2.25.75-1.875-.375-.75L.75 12V9l1.875-.375.375-.75L2.25 6 4.5 3.75l1.875.75.75-.375L7.5 2.25z" stroke="currentColor" stroke-width="1.2" fill="none"/>
              <circle cx="9" cy="10.5" r="2.25" stroke="currentColor" stroke-width="1.2" fill="none"/>
            </svg>
          </button>
        </div>
      </div>
      <!-- Video info -->
      <div id="videoInfo" class="vp-video-info" style="display: none">
        <div class="vp-video-title" id="videoTitle"></div>
        <div class="vp-time-display">
          <span id="currentTimeDisplay" class="vp-current-time">0:00</span>
          <span class="vp-playback-state" id="playbackState"></span>
        </div>
      </div>
    </header>

    <!-- Settings Panel -->
    <div id="settingsPanel" class="vp-settings-panel" style="display: none">
      <div class="vp-settings-row">
        <label>分類システム</label>
        <select id="settingSystem" class="vp-setting-select">
          <option value="5level">5段階レベル</option>
          <option value="cefr">CEFR (A1-C2)</option>
          <option value="frequency">Frequency Bands</option>
          <option value="tier">3-Tier</option>
        </select>
      </div>
      <div class="vp-settings-row">
        <label>翻訳言語</label>
        <select id="settingLang" class="vp-setting-select">
          <option value="ja">日本語</option>
          <option value="zh">中文</option>
          <option value="ko">한국어</option>
          <option value="en">None</option>
        </select>
      </div>
      <div class="vp-settings-row">
        <label>テーマ</label>
        <select id="settingTheme" class="vp-setting-select">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
    </div>

    <!-- Toggle Bar -->
    <div id="toggleBar" class="vp-toggle-bar" style="display: none">
      <label class="vp-toggle-label">
        <input type="checkbox" id="toggleTranslation" checked> 翻訳
      </label>
      <label class="vp-toggle-label">
        <input type="checkbox" id="toggleVocab" checked> 語彙
      </label>
      <label class="vp-toggle-label">
        <input type="checkbox" id="toggleSlang" checked> スラング
      </label>
      <label class="vp-toggle-label">
        <input type="checkbox" id="toggleIdiom" checked> 慣用句
      </label>
      <label class="vp-toggle-label">
        最低Lv:
        <select id="minLevelSelect" class="vp-setting-select-sm">
          <option value="1">1</option>
          <option value="2" selected>2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
      </label>
    </div>

    <!-- Action Bar -->
    <div class="vp-action-bar">
      <button id="analyzeBtn" class="btn-primary vp-analyze-btn">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M6 2a4 4 0 100 8 4 4 0 000-8zM1 6a5 5 0 119.45 2.04l3.25 3.26a.75.75 0 01-1.06 1.06l-3.26-3.25A5 5 0 011 6z" fill="currentColor"/>
        </svg>
        字幕を分析
      </button>
      <label class="vp-auto-sync-label">
        <input type="checkbox" id="autoSync" checked> 自動追従
      </label>
    </div>

    <!-- Loading -->
    <div id="loadingState" class="vp-loading" style="display: none">
      <div class="loading-spinner"></div>
      <span>字幕を取得中...</span>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="vp-empty-state">
      <svg width="48" height="48" viewBox="0 0 64 64" fill="none">
        <rect x="8" y="12" width="48" height="40" rx="4" stroke="currentColor" stroke-width="2" fill="none"/>
        <polygon points="28,24 28,40 42,32" fill="currentColor" opacity="0.4"/>
      </svg>
      <p>YouTube動画ページで字幕を分析できます。<br>「字幕を分析」をクリックしてください。</p>
    </div>

    <!-- Error State -->
    <div id="errorState" class="error-state" style="display: none"></div>

    <!-- Subtitle Timeline -->
    <div id="subtitleTimeline" class="vp-subtitle-timeline" style="display: none">
      <div id="subtitleList" class="vp-subtitle-list"></div>
    </div>

    <!-- Word Detail Panel (overlay) -->
    <div id="wordDetail" class="vp-word-detail" style="display: none">
      <button id="detailBack" class="vp-detail-back">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        戻る
      </button>
      <div id="detailContent" class="vp-detail-content"></div>
    </div>
  </div>

  <script type="module" src="video-panel.js"></script>
</body>
</html>
