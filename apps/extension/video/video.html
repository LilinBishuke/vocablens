<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VocabLens Video</title>
  <link rel="stylesheet" href="../styles/shared.css">
  <link rel="stylesheet" href="video.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <img src="../icons/icon32.png" alt="" class="header-icon">
        <h1 class="header-title">VocabLens Video</h1>
      </div>
      <div class="header-right">
        <button id="settingsBtn" class="icon-btn" title="設定">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M7.5 2.25h3l.375 1.875.75.375L13.5 3.75l2.25 2.25-.75 1.875.375.75L17.25 9v3l-1.875.375-.375.75.75 1.875-2.25 2.25-1.875-.75-.75.375L10.5 18.75h-3l-.375-1.875-.75-.375L4.5 17.25l-2.25-2.25.75-1.875-.375-.75L.75 12V9l1.875-.375.375-.75L2.25 6 4.5 3.75l1.875.75.75-.375L7.5 2.25z" stroke="currentColor" stroke-width="1.2" fill="none"/>
            <circle cx="9" cy="10.5" r="2.25" stroke="currentColor" stroke-width="1.2" fill="none"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Settings Panel (hidden by default) -->
    <div id="settingsPanel" class="settings-panel" style="display: none">
      <div class="settings-row">
        <label>分類システム</label>
        <select id="settingSystem" class="setting-select">
          <option value="5level">5段階レベル</option>
          <option value="cefr">CEFR (A1-C2)</option>
          <option value="frequency">Frequency Bands</option>
          <option value="tier">3-Tier</option>
        </select>
      </div>
      <div class="settings-row">
        <label>翻訳言語</label>
        <select id="settingLang" class="setting-select">
          <option value="ja">日本語</option>
          <option value="zh">中文</option>
          <option value="ko">한국어</option>
          <option value="en">None</option>
        </select>
      </div>
      <div class="settings-row">
        <label>テーマ</label>
        <select id="settingTheme" class="setting-select">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
    </div>

    <!-- URL Input -->
    <div class="url-bar">
      <input type="text" id="urlInput" class="url-input" placeholder="YouTube動画のURLを貼り付け...">
      <button id="loadBtn" class="btn-primary load-btn">読み込み</button>
    </div>

    <!-- Main Layout -->
    <div class="main-layout">
      <!-- Left: Library Sidebar -->
      <aside id="librarySidebar" class="library-sidebar">
        <div class="library-header">
          <h2>ライブラリ</h2>
          <span id="libraryCount" class="library-count">0</span>
        </div>
        <div id="libraryList" class="library-list">
          <div class="library-empty">
            <p>保存した動画はここに表示されます</p>
          </div>
        </div>
      </aside>

      <!-- Center: Video + Subtitles -->
      <main class="main-content">
        <!-- Empty State -->
        <div id="emptyState" class="video-empty-state">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <rect x="8" y="12" width="48" height="40" rx="4" stroke="currentColor" stroke-width="2" fill="none"/>
            <polygon points="28,24 28,40 42,32" fill="currentColor" opacity="0.4"/>
          </svg>
          <p>YouTube動画のURLを入力して学習を始めましょう</p>
        </div>

        <!-- Video Player -->
        <div id="videoSection" class="video-section" style="display: none">
          <div class="video-player-wrap">
            <div id="playerContainer" class="player-container"></div>
          </div>
          <div class="video-info">
            <h2 id="videoTitle" class="video-title"></h2>
            <div class="video-actions">
              <button id="bookmarkBtn" class="btn-secondary btn-sm">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path d="M3 1h8v12l-4-3-4 3V1z" stroke="currentColor" stroke-width="1.2" fill="none"/>
                </svg>
                保存
              </button>
              <button id="analyzeBtn" class="btn-primary btn-sm">字幕を分析</button>
            </div>
          </div>

          <!-- Display Toggles -->
          <div id="toggleBar" class="toggle-bar" style="display: none">
            <label class="toggle-label">
              <input type="checkbox" id="toggleTranslation" checked>
              翻訳
            </label>
            <label class="toggle-label">
              <input type="checkbox" id="toggleVocab" checked>
              語彙レベル
            </label>
            <label class="toggle-label">
              <input type="checkbox" id="toggleSlang" checked>
              スラング
            </label>
            <label class="toggle-label">
              <input type="checkbox" id="toggleIdiom" checked>
              イディオム
            </label>
            <label class="toggle-label">
              最低レベル:
              <select id="minLevelSelect" class="setting-select-sm">
                <option value="1">1</option>
                <option value="2" selected>2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>
            </label>
          </div>

          <!-- Loading -->
          <div id="subtitleLoading" class="subtitle-loading" style="display: none">
            <div class="loading-spinner"></div>
            <span>字幕を取得中...</span>
          </div>

          <!-- Error -->
          <div id="subtitleError" class="error-state" style="display: none"></div>

          <!-- SRT Upload fallback -->
          <div id="srtUpload" class="srt-upload" style="display: none">
            <p>字幕が見つかりませんでした。SRT/VTTファイルをアップロードできます：</p>
            <input type="file" id="srtFileInput" accept=".srt,.vtt">
          </div>
        </div>

        <!-- Subtitle Timeline -->
        <div id="subtitleTimeline" class="subtitle-timeline" style="display: none">
          <div id="subtitleList" class="subtitle-list"></div>
        </div>
      </main>

      <!-- Right: Word Detail Panel -->
      <aside id="detailPanel" class="detail-panel">
        <div id="detailEmpty" class="detail-empty">
          <p>字幕中の単語をクリックすると<br>詳細が表示されます</p>
        </div>
        <div id="detailContent" class="detail-content" style="display: none"></div>
      </aside>
    </div>
  </div>

  <script type="module" src="video.js"></script>
</body>
</html>
